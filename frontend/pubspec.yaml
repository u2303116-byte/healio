
name: healio
description: Healio Health App UI
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^10.1.0
  url_launcher: ^6.2.5
  # Added recommended packages for better functionality
  shared_preferences: ^2.2.2  # For data persistence
  provider: ^6.1.1  # For state management
  intl: ^0.19.0  # For date/number formatting
  flutter_local_notifications: ^17.0.0  # For local push notifications
  timezone: ^0.9.2
  flutter_timezone: ^3.0.0  # For getting device local timezone
  go_router: ^14.0.0  # Declarative routing with deep-link support
  flutter_inappwebview: ^6.1.5  # In-app WebView for YouTube tutorials
  http: ^1.2.0  # HTTP client for backend API calls

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1  # For code quality checks

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/spo2_lungs.png
